<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>테트리스 게임판</title>
    <link rel="stylesheet" href="css/tetris_style.css">
</head>
<body>
    <div class="tetris-wrapper">
        <div class="left-wrapper">
            <div class="side-paner">
                <div class="paner-title">HOLD</div>
                <div id="hold-box" class="image-box"></div>
            </div>

            <div class="score-paner">
                <div class="score-title">SCORE</div>
                <div id="score-val" class="score-value">0</div>
                <div class="score-title">LINES</div>
                <div id="lines-val" class="score-value">0</div>
            </div>
        </div>

        <div>
            <table id="main-board" class="main-board" style="border: 3px solid #555;"></table>
        </div>

        <div class="right-wrapper">
            <div class="side-paner">
                <div class="paner-title">NEXT</div>
                <div id="next-boards" class="next-blocks-container"></div>
            </div>

            <div class="time-paner">
                <div class="time-display">
                    <span id="time-main" class="time-main">0:00</span><span id="time-cs" class="time-cs">.00</span>
                </div>
            </div>
        </div>
    </div>

    <div id="pause-screen" class="overlay">
        <h1>PAUSED</h1>
        <button onclick="resumeGame()">계속하기</button>
        <button onclick="quitGame()">나가기</button>
    </div>

    <div id="gameover-screen" class="overlay">
        <h1>GAME OVER</h1>
        <button onclick="location.reload()">처음부터</button>
    </div>

    <div id="start-screen" class="overlay" style="display: flex;"> <!-- 게임을 켜자마자 해당 오버레이가 보이도록 우선순위가 높은 html 태그에서 display: flex 속성을 준다 -->
        <h1>TETRIS</h1>
        <button onclick="start()">게임 시작</button>
    </div>

    <div class="footer-credit">
        BGM: <a href="https://www.classicals.de/tetris-theme" target="_blank">Tetris Theme - Korobeiniki - Arranged for Music Box</a> by CLASSICALS.DE (Arr. Maru Piano) | Licensed under <a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>
    </div>

    <script src="js/tetris_script.js"></script>
</body>
</html>
