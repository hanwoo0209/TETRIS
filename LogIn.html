<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TETRIS - 로그인</title>
    <link rel="stylesheet" href="css/LogIn_style.css">
    <script>
        
    </script>
</head>
<body>
    <div class="login-box">
        <h1>로그인</h1>
    
        <label for="id">아이디</label> <input type="text" id="id" oninput="resetId()" placeholder="아이디" maxlength="10">
        
        <div id="id-msg" class="msg-text"></div>

        <label for="password">비밀번호</label>
        <input type="password" id="password" oninput="resetPw()" placeholder="비밀번호" maxlength="16">
        
        <div id="password-msg" class="msg-text"></div>

        <button onclick="Login()" style="height: 50px; font-size: 20px;">로그인</button>

        <div class="bottom-menu">
            <label class="keep-login-label">
                <input type="checkbox" id="keep-login">
                <span>로그인 상태 유지</span>
            </label>

            <a href="SignUp.html" style="margin: 0;">회원가입</a>
        </div>
    </div>

    <script src="js/LogIn_script.js"></script>
</body>
</html>
